name: Validate PR on push
on:
  push:
    branches: [master, staging, trying]
  pull_request:

jobs:
  build:
    name: Build
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: npm install  --frozen-lockfile
      - run: npm run pretest
